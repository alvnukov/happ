[alias]
fmt-check = "fmt --all -- --check"
lint = "clippy --workspace --lib --bins --examples --all-features --locked -- -D clippy::unwrap_used -D clippy::expect_used -D clippy::panic -D clippy::unreachable -D clippy::todo -D clippy::unimplemented -D clippy::dbg_macro"
lint-tests = "clippy --workspace --tests --all-features --locked -- -D clippy::bool_assert_comparison -D clippy::useless_vec -D clippy::useless_format"
