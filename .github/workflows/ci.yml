name: CI

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
        with:
          fetch-depth: 0

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Go toolchain
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.7"

      - name: Setup Node.js (for web UI tests)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Lint happ (Rust)
        run: |
          set -euo pipefail
          cargo fmt --check
          cargo clippy --workspace --all-targets --locked

      - name: Test happ (Rust)
        run: |
          set -euo pipefail
          cargo test --locked

      - name: Parity matrix (happ CLI contracts)
        run: |
          set -euo pipefail
          cargo test --locked --test parity_cli

      - name: Install web test dependencies
        run: |
          set -euo pipefail
          cd web
          npm ci

      - name: Lint web assets
        run: |
          set -euo pipefail
          cd web
          npm run lint

      - name: Install Chromium (Playwright)
        run: |
          set -euo pipefail
          cd web
          npx playwright install --with-deps chromium

      - name: Build happ for web UI tests
        run: |
          set -euo pipefail
          cargo build --locked

      - name: Run web UI tests (e2e + visual + structure)
        run: |
          set -euo pipefail
          cd web
          npm run test:ui

  coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v2
        with:
          fetch-depth: 0

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Go toolchain
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.7"

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Install llvm-tools-preview
        run: rustup component add llvm-tools-preview

      - name: Generate coverage (lcov)
        run: |
          set -euo pipefail
          cargo llvm-cov --workspace --all-features --lcov --output-path lcov.info

      - name: Coverage summary
        run: |
          set -euo pipefail
          cargo llvm-cov report --summary-only | tee coverage-summary.txt
          echo "## Coverage summary" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat coverage-summary.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: |
            lcov.info
            coverage-summary.txt

      - name: Upload to Codecov
        if: ${{ env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
          verbose: true

      - name: Codecov not configured
        if: ${{ env.CODECOV_TOKEN == '' }}
        run: echo "::warning::CODECOV_TOKEN is not set, skipping Codecov upload."

  platform-build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            asset_name: happ_linux_amd64
            binary_path: target/x86_64-unknown-linux-musl/release/happ
            rust_target: x86_64-unknown-linux-musl
          - runner: ubuntu-24.04-arm
            asset_name: happ_linux_arm64
            binary_path: target/aarch64-unknown-linux-musl/release/happ
            rust_target: aarch64-unknown-linux-musl
          - runner: macos-15-intel
            asset_name: happ_darwin_amd64
            binary_path: target/release/happ
            rust_target: ""
          - runner: macos-14
            asset_name: happ_darwin_arm64
            binary_path: target/release/happ
            rust_target: ""
          - runner: windows-latest
            asset_name: happ_windows_amd64.exe
            binary_path: target/release/happ.exe
            rust_target: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v2
        with:
          fetch-depth: 0

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Go toolchain
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.7"

      - name: Setup musl toolchain (Linux static build)
        if: ${{ matrix.rust_target != '' }}
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y musl-tools
          rustup target add "${{ matrix.rust_target }}"

      - name: Build happ binary
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ matrix.rust_target }}" ]; then
            cargo build --release --locked --target "${{ matrix.rust_target }}"
          else
            cargo build --release --locked
          fi
          mkdir -p dist
          cp "${{ matrix.binary_path }}" "dist/${{ matrix.asset_name }}"
          test -s "dist/${{ matrix.asset_name }}"
          if [ -n "${{ matrix.rust_target }}" ]; then
            file "dist/${{ matrix.asset_name }}" | grep -Eqi "statically linked|static-pie linked"
          fi

      - name: Upload platform artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}

  linux-packages:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            deb_arch: amd64
            rpm_arch: x86_64
            rust_target: x86_64-unknown-linux-musl
          - runner: ubuntu-24.04-arm
            deb_arch: arm64
            rpm_arch: aarch64
            rust_target: aarch64-unknown-linux-musl
    steps:
      - name: Checkout
        uses: actions/checkout@v2
        with:
          fetch-depth: 0

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Go toolchain
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.7"

      - name: Install packaging tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y musl-tools
          rustup target add "${{ matrix.rust_target }}"
          cargo install --locked cargo-deb cargo-generate-rpm

      - name: Build happ binary (static Linux)
        run: |
          set -euo pipefail
          cargo build --release --locked --target "${{ matrix.rust_target }}"
          mkdir -p target/release
          cp "target/${{ matrix.rust_target }}/release/happ" "target/release/happ"
          file target/release/happ | grep -Eqi "statically linked|static-pie linked"

      - name: Build .deb and .rpm packages
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(grep -E '^version = ' Cargo.toml | head -1 | cut -d '"' -f2)"
          mkdir -p dist
          cargo deb --no-build --no-strip --output "dist/happ_${VERSION}_${{ matrix.deb_arch }}.deb"
          cargo generate-rpm --output dist
          rpm_file="$(find dist -maxdepth 1 -type f -name '*.rpm' | head -n 1)"
          test -n "${rpm_file}"
          rpm_target="dist/happ-${VERSION}-1.${{ matrix.rpm_arch }}.rpm"
          if [ "${rpm_file}" != "${rpm_target}" ]; then
            mv "${rpm_file}" "${rpm_target}"
          fi
          ls -la dist

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: packages-${{ matrix.deb_arch }}
          path: |
            dist/*.deb
            dist/*.rpm

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - test
      - coverage
      - platform-build
      - linux-packages
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Verify release assets
        run: |
          set -euo pipefail
          ls -la dist
          test -s dist/happ_linux_amd64
          test -s dist/happ_linux_arm64
          test -s dist/happ_darwin_amd64
          test -s dist/happ_darwin_arm64
          test -s dist/happ_windows_amd64.exe
          compgen -G "dist/happ_*_amd64.deb" > /dev/null
          compgen -G "dist/happ_*_arm64.deb" > /dev/null
          compgen -G "dist/happ-*-1.x86_64.rpm" > /dev/null
          compgen -G "dist/happ-*-1.aarch64.rpm" > /dev/null

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/happ_linux_amd64
            dist/happ_linux_arm64
            dist/happ_darwin_amd64
            dist/happ_darwin_arm64
            dist/happ_windows_amd64.exe
            dist/happ_*_amd64.deb
            dist/happ_*_arm64.deb
            dist/happ-*-1.x86_64.rpm
            dist/happ-*-1.aarch64.rpm
