name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v2
        with:
          fetch-depth: 0

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Node.js (for web UI tests)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Test happ (Rust)
        run: |
          set -euo pipefail
          cargo fmt --check
          cargo test --locked

      - name: Parity matrix (happ CLI contracts)
        run: |
          set -euo pipefail
          cargo test --locked --test parity_cli

      - name: Install web test dependencies
        run: |
          set -euo pipefail
          cd web
          npm ci
          npx playwright install --with-deps chromium

      - name: Build happ for web UI tests
        run: |
          set -euo pipefail
          cargo build --locked

      - name: Run web UI tests (e2e + visual + structure)
        run: |
          set -euo pipefail
          cd web
          npm run test:ui

  coverage:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v2
        with:
          fetch-depth: 0

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Install llvm-tools-preview
        run: rustup component add llvm-tools-preview

      - name: Generate coverage (lcov)
        run: |
          set -euo pipefail
          cargo llvm-cov --workspace --all-features --lcov --output-path lcov.info

      - name: Coverage summary
        run: |
          set -euo pipefail
          cargo llvm-cov report --summary-only | tee coverage-summary.txt
          echo "## Coverage summary" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat coverage-summary.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: |
            lcov.info
            coverage-summary.txt

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          use_oidc: true
          fail_ci_if_error: true
          verbose: true

  platform-build:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            asset_name: happ_linux_amd64
            binary_path: target/release/happ
          - runner: ubuntu-24.04-arm
            asset_name: happ_linux_arm64
            binary_path: target/release/happ
          - runner: macos-15-intel
            asset_name: happ_darwin_amd64
            binary_path: target/release/happ
          - runner: macos-14
            asset_name: happ_darwin_arm64
            binary_path: target/release/happ
          - runner: windows-latest
            asset_name: happ_windows_amd64.exe
            binary_path: target/release/happ.exe
    steps:
      - name: Checkout
        uses: actions/checkout@v2
        with:
          fetch-depth: 0

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build happ binary
        shell: bash
        run: |
          set -euo pipefail
          cargo build --release --locked
          mkdir -p dist
          cp "${{ matrix.binary_path }}" "dist/${{ matrix.asset_name }}"
          test -s "dist/${{ matrix.asset_name }}"
