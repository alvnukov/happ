name: CI

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Lint GitHub Actions workflows
        run: |
          set -euo pipefail
          bin_dir="${RUNNER_TEMP}/actionlint-bin"
          mkdir -p "${bin_dir}"
          bash <(curl -sSfL https://raw.githubusercontent.com/rhysd/actionlint/393031adb9afb225ee52ae2ccd7a5af5525e03e8/scripts/download-actionlint.bash) 1.7.11 "${bin_dir}"
          "${bin_dir}/actionlint"

      - name: Review dependency changes
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48
        with:
          fail-on-severity: low

      - name: Scan changed commits for leaked secrets
        uses: trufflesecurity/trufflehog@6c05c4a00b91aa542267d8e32a8254774799d68d
        with:
          path: ./

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
        with:
          toolchain: stable

      - name: Setup Go toolchain
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version: "1.26.2"

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"

      - name: Install cargo-deny
        uses: taiki-e/install-action@7f8c46cb787815968435d46f3a3321ad221eeafb
        with:
          tool: cargo-deny

      - name: Install cargo-audit
        uses: taiki-e/install-action@de9faa98b1f383ab2d2c2bb9c002f9048f58d059
        with:
          tool: cargo-audit

      - name: Install govulncheck
        shell: bash
        run: |
          set -euo pipefail
          go install golang.org/x/vuln/cmd/govulncheck@v1.1.4
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Cargo deny
        run: |
          set -euo pipefail
          cargo deny check advisories bans sources

      - name: Cargo audit
        run: |
          set -euo pipefail
          cargo audit --deny warnings

      - name: Go vuln check
        working-directory: src/go_compat/helm_ir_ffi_helper
        run: |
          set -euo pipefail
          govulncheck ./...

      - name: Web dependency audit
        working-directory: web
        run: |
          set -euo pipefail
          npm audit --audit-level=low --package-lock-only

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
        with:
          toolchain: stable

      - name: Setup Go toolchain
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version: "1.26.2"

      - name: Setup Node.js (for web UI tests)
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"

      - name: Lint happ (Rust)
        run: |
          set -euo pipefail
          cargo fmt-check
          cargo lint
          cargo lint-tests

      - name: Test happ (Rust)
        run: |
          set -euo pipefail
          cargo test --locked

      - name: Parity matrix (happ CLI contracts)
        run: |
          set -euo pipefail
          cargo test --locked --test parity_cli

      - name: Install web test dependencies
        run: |
          set -euo pipefail
          cd web
          npm ci

      - name: Lint web assets
        run: |
          set -euo pipefail
          cd web
          npm run lint

      - name: Install Chromium (Playwright)
        run: |
          set -euo pipefail
          cd web
          npx playwright install --with-deps chromium

      - name: Build happ for web UI tests
        run: |
          set -euo pipefail
          cargo build --locked

      - name: Run web UI tests (e2e + visual + structure)
        run: |
          set -euo pipefail
          cd web
          npm run test:ui

  coverage:
    runs-on: ubuntu-latest
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
        with:
          toolchain: stable

      - name: Setup Go toolchain
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version: "1.26.2"

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@3ba22c660d7a3fe71d40eeb5830575b980204503
        with:
          tool: cargo-llvm-cov

      - name: Install llvm-tools-preview
        run: rustup component add llvm-tools-preview

      - name: Generate coverage (lcov)
        run: |
          set -euo pipefail
          cargo llvm-cov --workspace --all-features --lcov --output-path lcov.info

      - name: Coverage summary
        run: |
          set -euo pipefail
          cargo llvm-cov report --summary-only | tee coverage-summary.txt
          {
            echo "## Coverage summary"
            echo '```'
            cat coverage-summary.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: coverage-lcov
          path: |
            lcov.info
            coverage-summary.txt

      - name: Upload to Codecov
        if: ${{ env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
          verbose: true

      - name: Codecov not configured
        if: ${{ env.CODECOV_TOKEN == '' }}
        run: echo "::warning::CODECOV_TOKEN is not set, skipping Codecov upload."

  platform-build:
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            asset_name: happ_linux_amd64
            binary_path: target/x86_64-unknown-linux-musl/release/happ
            rust_target: x86_64-unknown-linux-musl
          - runner: ubuntu-24.04-arm
            asset_name: happ_linux_arm64
            binary_path: target/aarch64-unknown-linux-musl/release/happ
            rust_target: aarch64-unknown-linux-musl
          - runner: macos-15-intel
            asset_name: happ_darwin_amd64
            binary_path: target/release/happ
            rust_target: ""
          - runner: macos-14
            asset_name: happ_darwin_arm64
            binary_path: target/release/happ
            rust_target: ""
          - runner: windows-latest
            asset_name: happ_windows_amd64.exe
            binary_path: target/release/happ.exe
            rust_target: ""
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
        with:
          toolchain: stable

      - name: Setup Go toolchain
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version: "1.26.2"

      - name: Setup musl toolchain (Linux static build)
        if: ${{ matrix.rust_target != '' }}
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y musl-tools
          rustup target add "${{ matrix.rust_target }}"

      - name: Build happ binary
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "${{ matrix.rust_target }}" ]; then
            cargo build --release --locked --target "${{ matrix.rust_target }}"
          else
            cargo build --release --locked
          fi
          mkdir -p dist
          cp "${{ matrix.binary_path }}" "dist/${{ matrix.asset_name }}"
          test -s "dist/${{ matrix.asset_name }}"
          if [ -n "${{ matrix.rust_target }}" ]; then
            file "dist/${{ matrix.asset_name }}" | grep -Eqi "statically linked|static-pie linked"
          fi

      - name: Attest platform artifact
        if: ${{ !github.event.repository.private }}
        uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661
        with:
          subject-path: dist/${{ matrix.asset_name }}

      - name: Upload platform artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}

  linux-packages:
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            deb_arch: amd64
            rpm_arch: x86_64
            rust_target: x86_64-unknown-linux-musl
          - runner: ubuntu-24.04-arm
            deb_arch: arm64
            rpm_arch: aarch64
            rust_target: aarch64-unknown-linux-musl
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
        with:
          toolchain: stable

      - name: Setup Go toolchain
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version: "1.26.2"

      - name: Install packaging tools
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y musl-tools
          rustup target add "${{ matrix.rust_target }}"
          cargo install --locked cargo-deb cargo-generate-rpm

      - name: Build happ binary (static Linux)
        run: |
          set -euo pipefail
          cargo build --release --locked --target "${{ matrix.rust_target }}"
          mkdir -p target/release
          cp "target/${{ matrix.rust_target }}/release/happ" "target/release/happ"
          file target/release/happ | grep -Eqi "statically linked|static-pie linked"

      - name: Build .deb and .rpm packages
        shell: bash
        run: |
          set -euo pipefail
          VERSION="$(grep -E '^version = ' Cargo.toml | head -1 | cut -d '"' -f2)"
          mkdir -p dist
          cargo deb --no-build --no-strip --output "dist/happ_${VERSION}_${{ matrix.deb_arch }}.deb"
          cargo generate-rpm --output dist
          rpm_file="$(find dist -maxdepth 1 -type f -name '*.rpm' | head -n 1)"
          test -n "${rpm_file}"
          rpm_target="dist/happ-${VERSION}-1.${{ matrix.rpm_arch }}.rpm"
          if [ "${rpm_file}" != "${rpm_target}" ]; then
            mv "${rpm_file}" "${rpm_target}"
          fi
          ls -la dist

      - name: Attest Linux packages
        if: ${{ !github.event.repository.private }}
        uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661
        with:
          subject-path: |
            dist/*.deb
            dist/*.rpm

      - name: Upload package artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: packages-${{ matrix.deb_arch }}
          path: |
            dist/*.deb
            dist/*.rpm

  release-readiness:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7
        with:
          toolchain: stable
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version: "1.26.2"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "20"
      - name: Verify dependency freshness before release
        run: |
          set -euo pipefail
          if ! ./scripts/check-release-deps.sh; then
            echo "::warning::release dependency freshness check reported newer compatible dependencies; not blocking tagged release."
          fi

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - security
      - test
      - coverage
      - platform-build
      - linux-packages
      - release-readiness
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: dist
          merge-multiple: true

      - name: Verify release assets
        run: |
          set -euo pipefail
          ls -la dist
          test -s dist/happ_linux_amd64
          test -s dist/happ_linux_arm64
          test -s dist/happ_darwin_amd64
          test -s dist/happ_darwin_arm64
          test -s dist/happ_windows_amd64.exe
          compgen -G "dist/happ_*_amd64.deb" > /dev/null
          compgen -G "dist/happ_*_arm64.deb" > /dev/null
          compgen -G "dist/happ-*-1.x86_64.rpm" > /dev/null
          compgen -G "dist/happ-*-1.aarch64.rpm" > /dev/null

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b
        with:
          generate_release_notes: true
          files: |
            dist/happ_linux_amd64
            dist/happ_linux_arm64
            dist/happ_darwin_amd64
            dist/happ_darwin_arm64
            dist/happ_windows_amd64.exe
            dist/happ_*_amd64.deb
            dist/happ_*_arm64.deb
            dist/happ-*-1.x86_64.rpm
            dist/happ-*-1.aarch64.rpm

  homebrew-tap:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - release
    runs-on: ubuntu-latest
    steps:
      - name: Update Homebrew tap formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${HOMEBREW_TAP_TOKEN:-}" ]; then
            echo "::warning::HOMEBREW_TAP_TOKEN is not set, skipping Homebrew tap publish."
            exit 0
          fi

          VERSION="${GITHUB_REF_NAME#v}"
          TARBALL_URL="https://github.com/alvnukov/happ/archive/refs/tags/v${VERSION}.tar.gz"
          TMP_DIR="$(mktemp -d)"
          curl -fsSL "${TARBALL_URL}" -o "${TMP_DIR}/happ.tar.gz"
          SHA256="$(sha256sum "${TMP_DIR}/happ.tar.gz" | awk '{print $1}')"

          TAP_DIR="${TMP_DIR}/homebrew-tap"
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/alvnukov/homebrew-tap.git" "${TAP_DIR}"

          cat <<EOF | sed 's/^          //' > "${TAP_DIR}/Formula/happ.rb"
          class Happ < Formula
            desc "Helm chart and manifest importer/converter for helm-apps"
            homepage "https://github.com/alvnukov/happ"
            url "https://github.com/alvnukov/happ/archive/refs/tags/v${VERSION}.tar.gz"
            sha256 "${SHA256}"
            license "Apache-2.0"
            head "https://github.com/alvnukov/happ.git", branch: "main"
          
            depends_on "rust" => :build
            depends_on "go" => :build
          
            def install
              ENV["HAPP_GO_BIN"] = (Formula["go"].opt_bin/"go").to_s
              system "cargo", "install", *std_cargo_args(path: ".")
            end
          
            test do
              output = shell_output("#{bin}/happ --help")
              assert_match "happ", output
              assert_match "jq", output
            end
          end
          EOF

          cd "${TAP_DIR}"
          if git diff --quiet -- Formula/happ.rb; then
            echo "Homebrew formula is already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/happ.rb
          git commit -m "happ v${VERSION}"
          git push origin main
